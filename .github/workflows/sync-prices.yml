name: Sync Prices (Worker → tl-dist → jsDelivr)

on:
  schedule:
    - cron: '*/5 * * * *'   # 每 5 分钟
  workflow_dispatch:         # 手动触发

permissions:
  contents: write            # 允许 push prices.json

concurrency:
  group: sync-prices
  cancel-in-progress: false  # 排队，不中断正在跑的

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch prices + fire_price from Cloudflare Worker
        run: |
          set -e
          HDR_UA='User-Agent: TorchPriceTracker/1.1.7-mirror'
          HDR_CID='X-Client-Id: ff00112233445566778899aabbccddeeff00112233445566778899aabbccddee'
          HDR_VER='X-Version: 1.1.7'
          # 1) 行情全量
          curl -sS --max-time 30 --retry 3 --retry-delay 2 \
            -H "$HDR_UA" -H "$HDR_CID" -H "$HDR_VER" \
            'https://tl-worker.hyx920503.workers.dev/prices?season=1301' \
            -o prices.new.json
          # 2) 火价（初火 → 人民币汇率，每天 03:00 更新一次，镜像保 30 天序列）
          curl -sS --max-time 30 --retry 3 --retry-delay 2 \
            -H "$HDR_UA" -H "$HDR_CID" -H "$HDR_VER" \
            'https://tl-worker.hyx920503.workers.dev/fireprice?season=1301&platform=2&days=30' \
            -o fire_price.new.json || true
          SIZE=$(wc -c < prices.new.json)
          echo "fetched: $SIZE bytes"
          if [ "$SIZE" -lt 1000 ]; then
            echo "::error::Response too small, likely failed"
            cat prices.new.json
            exit 1
          fi
          python -c "import json; d = json.load(open('prices.new.json')); assert d.get('success') and len(d.get('data', [])) > 10, 'bad data'; print('items:', len(d['data']))"

      - name: Commit if changed
        id: commit
        run: |
          set -e
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          mv prices.new.json prices.json
          # 火价可选（只在成功下载且有效时更新）
          if [ -s fire_price.new.json ] && python -c "import json; d=json.load(open('fire_price.new.json')); assert d.get('ok')" 2>/dev/null; then
            mv fire_price.new.json fire_price.json
            git add fire_price.json
          else
            rm -f fire_price.new.json
          fi
          git add prices.json
          if git diff --cached --quiet; then
            echo "no change, skipping commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "sync: $(date -u +%FT%TZ)"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Purge jsDelivr cache
        if: steps.commit.outputs.changed == 'true'
        run: |
          # jsDelivr purge 免费+免鉴权，推完 1 分钟内全球 CDN 生效
          for path in prices.json fire_price.json; do
            curl -sS -X POST "https://purge.jsdelivr.net/gh/xiaoyihuang0503-cyber/tl-dist@main/$path" | head -c 200
            echo ""
          done

      - name: Verify endpoints
        if: steps.commit.outputs.changed == 'true'
        run: |
          sleep 15
          for url in \
            "https://cdn.jsdelivr.net/gh/xiaoyihuang0503-cyber/tl-dist@main/prices.json" \
            "https://fastly.jsdelivr.net/gh/xiaoyihuang0503-cyber/tl-dist@main/prices.json" \
            "https://raw.githubusercontent.com/xiaoyihuang0503-cyber/tl-dist/main/prices.json"; do
            echo "=== $url ==="
            curl -sI -L --max-time 10 "$url" | head -4 || true
          done
