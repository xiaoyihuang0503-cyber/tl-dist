name: Sync to Gitee

on:
  push:
    branches: [main]
    paths: ['version.json']

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Gitee
        run: |
          git remote add gitee https://easiao08:${{ secrets.GITEE_TOKEN }}@gitee.com/easiao08/tl-dist.git 2>/dev/null || true
          git push gitee main --force
