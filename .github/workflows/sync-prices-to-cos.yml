name: Sync Prices to Tencent COS

on:
  schedule:
    # 每 5 分钟触发一次（UTC · 国内用户无感延迟）
    - cron: '*/5 * * * *'
  workflow_dispatch:  # 允许手动触发调试

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch prices from Cloudflare Worker
        run: |
          set -e
          curl -sS --max-time 30 \
            -H 'User-Agent: TL-Prices-Syncer/1.0' \
            'https://tl-worker.hyx920503.workers.dev/prices?season=1301' \
            -o prices.json
          SIZE=$(wc -c < prices.json)
          echo "fetched: $SIZE bytes"
          if [ "$SIZE" -lt 1000 ]; then
            echo "::error::Response too small, likely failed"
            cat prices.json
            exit 1
          fi
          # 快速校验 JSON 有效性
          python -c "import json; d = json.load(open('prices.json')); assert d.get('success') and len(d.get('data', [])) > 10, 'bad data'"
          echo "items: $(python -c "import json; print(len(json.load(open('prices.json'))['data']))")"

      - name: Upload to Tencent COS
        uses: TencentCloud/cos-action@v1
        with:
          secret_id: ${{ secrets.TENCENT_SECRET_ID }}
          secret_key: ${{ secrets.TENCENT_SECRET_KEY }}
          cos_bucket: ${{ secrets.TENCENT_COS_BUCKET }}
          cos_region: ${{ secrets.TENCENT_COS_REGION }}
          local_path: prices.json
          remote_path: /prices.json
          clean: false

      - name: Verify COS endpoint
        run: |
          URL="https://${{ secrets.TENCENT_COS_BUCKET }}.cos.${{ secrets.TENCENT_COS_REGION }}.myqcloud.com/prices.json"
          echo "Checking: $URL"
          # 等 10 秒让 COS 最终一致
          sleep 10
          curl -sI "$URL" | head -5
